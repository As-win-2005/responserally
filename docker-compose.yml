services:

  backend:
    build: ./backend
    container_name: responserally_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

  frontend:
    build: ./frontend
    container_name: responserally_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend